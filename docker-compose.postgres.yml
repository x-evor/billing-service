services:
  postgres:
    image: postgres:16
    container_name: billing-service-test-postgres
    environment:
      POSTGRES_DB: billing_service_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing_service_test"]
      interval: 2s
      timeout: 2s
      retries: 20
